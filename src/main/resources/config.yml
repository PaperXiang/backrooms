messages:
  prefix: "<dark_gray>[<yellow>Backrooms</yellow>]</dark_gray> "
  no-permission: "<red>你没有权限使用这个命令。"
  player-only: "<red>这个命令只能由玩家执行。"
  reload: "<green>配置已重载。当前已加载 <yellow><count></yellow> 个 Level。"
  unknown-command: "<red>未知子命令。输入 <yellow>/br help</yellow> 查看帮助。"
  help:
    - "<yellow><bold>BackroomsCore</bold></yellow> <gray>- 基础命令</gray>"
    - "<gray>/br help</gray> <dark_gray>-</dark_gray> <white>查看帮助</white>"
    - "<gray>/br levels</gray> <dark_gray>-</dark_gray> <white>查看已配置 Level</white>"
    - "<gray>/br level <id></gray> <dark_gray>-</dark_gray> <white>查看 Level 详情</white>"
    - "<gray>/br level info <id></gray> <dark_gray>-</dark_gray> <white>查看 Level 详情</white>"
    - "<gray>/br level tp <id></gray> <dark_gray>-</dark_gray> <white>传送到指定 Level</white>"
    - "<gray>/br reload</gray> <dark_gray>-</dark_gray> <white>重载配置</white>"
  levels-header: "<yellow>已加载 Level：</yellow>"
  levels-empty: "<red>当前没有启用或配置任何 Level。"
  level-line: "<gray>-</gray> <yellow><id></yellow> <dark_gray>|</dark_gray> <white><display></white> <dark_gray>| world:</dark_gray> <gray><world></gray> <dark_gray>| enabled:</dark_gray> <enabled>"
  level-not-found: "<red>找不到 Level：<yellow><id></yellow>"
  level-disabled: "<red>Level <yellow><id></yellow> 当前未启用。"
  level-tp-usage: "<red>用法：<yellow>/br level tp <id></yellow>"
  level-world-not-loaded: "<red>Level <yellow><id></yellow> 的世界 <yellow><world></yellow> 未加载。请先用 Multiverse 或服务端配置加载该世界。"
  level-teleport-success: "<green>已传送到 <yellow><id></yellow> <gray>(<display><gray>)。"
  level-teleport-failed: "<red>传送到 Level <yellow><id></yellow> 失败。"
  level-info:
    - "<yellow><bold><display></bold></yellow> <dark_gray>(<id>)</dark_gray>"
    - "<gray>世界：</gray><white><world></white>"
    - "<gray>启用：</gray><enabled>"
    - "<gray>PVP：</gray><pvp>"
    - "<gray>标题：</gray><title>"
    - "<gray>副标题：</gray><subtitle>"
    - "<dark_gray><description></dark_gray>"

level-title:
  enabled: true
  fade-in-ticks: 10
  stay-ticks: 60
  fade-out-ticks: 20
  show-on-join: false

