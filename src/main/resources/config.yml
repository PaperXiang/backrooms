level-title:
  enabled: true
  fade-in-ticks: 10
  stay-ticks: 60
  fade-out-ticks: 20
  show-on-join: false

resource-blocks:
  enabled: true
  definitions:
    level0_loose_carpet:
      levels:
        - level_0
      materials:
        - YELLOW_CARPET
      triggers:
        - right_click
      cancel-original-event: true
      remove-block: false
      cooldown-seconds: 30
      drops:
        - material: PAPER
          chance: 0.25
          min: 1
          max: 1
    level1_scrap_ore:
      levels:
        - level_1
      materials:
        - IRON_ORE
        - COPPER_ORE
      triggers:
        - break
      cancel-original-event: true
      remove-block: true
      replacement: AIR
      cooldown-seconds: 0
      drops:
        - material: IRON_NUGGET
          chance: 1.0
          min: 1
          max: 4
        - material: STRING
          chance: 0.25
          min: 1
          max: 2

levels:
  level_0:
    enabled: true
    display-name: "<yellow>Level 0</yellow>"
    world: "level_0"
    spawn:
      x: 0.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
    pvp: false
    rules:
      allow-block-break: false
      allow-block-place: false
      resource-interaction: true
    title: "<yellow><bold>Level 0</bold></yellow>"
    subtitle: "<gray>Threshold | 生存难度 1 | 实体：未确认</gray>"
    description: "阈限体验、基础探索与寻找 Level 1 入口。"
  level_1:
    enabled: true
    display-name: "<gold>Level 1</gold>"
    world: "level_1"
    spawn:
      x: 0.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
    pvp: false
    rules:
      allow-block-break: false
      allow-block-place: false
      resource-interaction: true
    title: "<gold><bold>Level 1</bold></gold>"
    subtitle: "<gray>Habitable Zone | 资源竞争 | 楼梯井撤离</gray>"
    description: "资源竞争、基地 claim、局部 PVP 与返回 MEG 主基地的撤离层。"
