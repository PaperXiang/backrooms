resource-blocks:
  enabled: true
  definitions:
    level0_loose_carpet:
      levels:
        - level_0
      materials:
        - YELLOW_CARPET
      triggers:
        - right_click
      cancel-original-event: true
      remove-block: false
      cooldown-seconds: 30
      drops:
        - material: PAPER
          chance: 0.25
          min: 1
          max: 1
    level1_scrap_ore:
      levels:
        - level_1
      materials:
        - IRON_ORE
        - COPPER_ORE
      triggers:
        - break
      cancel-original-event: true
      remove-block: true
      replacement: AIR
      cooldown-seconds: 0
      drops:
        - material: IRON_NUGGET
          chance: 1.0
          min: 1
          max: 4
        - material: STRING
          chance: 0.25
          min: 1
          max: 2
