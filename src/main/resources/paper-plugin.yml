name: backrooms
version: '1.0-SNAPSHOT'
main: org.monday.backrooms.Backrooms
api-version: '1.21'
prefix: Backrooms
authors: [ DYF, Paper_Xiang ]
description: backrooms plugin
website: mc.monday-ovo.top
commands:
  br:
    description: Backrooms main command
    usage: /br <help|levels|level|rooms|room|transitions|transition|debug|reload>
    aliases: [backrooms]
permissions:
  backrooms.command.br:
    description: Allows using the Backrooms base command
    default: true
  backrooms.command.reload:
    description: Allows reloading Backrooms configuration
    default: op
  backrooms.command.level.tp:
    description: Allows teleporting to configured Backrooms levels
    default: op
  backrooms.command.debug.current:
    description: Allows checking current Backrooms runtime state
    default: op
  backrooms.command.transitions:
    description: Allows listing configured Backrooms transitions
    default: op
  backrooms.command.transition.info:
    description: Allows viewing Backrooms transition details
    default: op
  backrooms.command.transition.trigger:
    description: Allows manually triggering Backrooms transitions
    default: op
  backrooms.command.transition.guide:
    description: Allows showing Backrooms transition trigger guides
    default: op
  backrooms.command.room.list:
    description: Allows listing configured Backrooms room templates
    default: op
  backrooms.command.room.info:
    description: Allows viewing Backrooms room template details
    default: op
  backrooms.command.room.generate:
    description: Allows generating Backrooms room prototypes
    default: op
  backrooms.transition.use:
    description: Allows using configured Backrooms transitions
    default: true
  backrooms.transition.bypass.cooldown:
    description: Allows bypassing Backrooms transition cooldowns
    default: op
  backrooms.bypass.build:
    description: Allows bypassing Backrooms build protection
    default: op
  backrooms.admin:
    description: Allows all Backrooms administrative commands
    default: op
    children:
      backrooms.command.br: true
      backrooms.command.reload: true
      backrooms.command.level.tp: true
      backrooms.command.debug.current: true
      backrooms.command.transitions: true
      backrooms.command.transition.info: true
      backrooms.command.transition.trigger: true
      backrooms.command.transition.guide: true
      backrooms.command.room.list: true
      backrooms.command.room.info: true
      backrooms.command.room.generate: true
      backrooms.transition.use: true
      backrooms.transition.bypass.cooldown: true
      backrooms.bypass.build: true
