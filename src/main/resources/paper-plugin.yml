name: backrooms
version: '${version}'
main: org.monday.backrooms.Backrooms
api-version: '1.21'
prefix: Backrooms
authors: [ DYF, Paper_Xiang ]
description: backrooms plugin
website: mc.monday-ovo.top
dependencies:
  server:
    WorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    FastAsyncWorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    VectorDisplays:
      load: BEFORE
      required: false
      join-classpath: true
permissions:
  backrooms.command.br:
    description: Allows using the Backrooms base command
    default: true
  backrooms.command.reload:
    description: Allows reloading Backrooms configuration
    default: op
  backrooms.command.level.tp:
    description: Allows teleporting to configured Backrooms levels
    default: op
  backrooms.command.debug.current:
    description: Allows checking current Backrooms runtime state
    default: op
  backrooms.command.debug.config:
    description: Allows checking Backrooms runtime config summary
    default: op
  backrooms.command.transitions:
    description: Allows listing configured Backrooms transitions
    default: op
  backrooms.command.transition.info:
    description: Allows viewing Backrooms transition details
    default: op
  backrooms.command.transition.trigger:
    description: Allows manually triggering Backrooms transitions
    default: op
  backrooms.command.transition.guide:
    description: Allows showing Backrooms transition trigger guides
    default: op
  backrooms.command.room.list:
    description: Allows listing configured Backrooms room templates
    default: op
  backrooms.command.room.info:
    description: Allows viewing Backrooms room template details
    default: op
  backrooms.command.room.generate:
    description: Allows generating Backrooms room prototypes
    default: op
  backrooms.command.loot.list:
    description: Allows listing configured Backrooms loot tables
    default: op
  backrooms.command.loot.info:
    description: Allows viewing Backrooms loot table details
    default: op
  backrooms.command.loot.roll:
    description: Allows manually rolling Backrooms loot tables
    default: op
  backrooms.command.loot.source.list:
    description: Allows listing configured Backrooms loot sources
    default: op
  backrooms.command.loot.source.info:
    description: Allows viewing Backrooms loot source details
    default: op
  backrooms.command.loot.source.trigger:
    description: Allows triggering direct Backrooms loot sources
    default: op
  backrooms.command.item.list:
    description: Allows listing configured Backrooms items
    default: op
  backrooms.command.item.info:
    description: Allows viewing Backrooms item details
    default: op
  backrooms.command.item.give:
    description: Allows giving Backrooms items
    default: op
  backrooms.command.resource.list:
    description: Allows listing configured Backrooms resource blocks
    default: op
  backrooms.command.resource.info:
    description: Allows viewing Backrooms resource block details
    default: op
  backrooms.command.worldgen.templates:
    description: Allows listing configured Backrooms schematic templates
    default: op
  backrooms.command.worldgen.generate:
    description: Allows generating finite Backrooms schematic grid regions
    default: op
  backrooms.transition.use:
    description: Allows using configured Backrooms transitions
    default: true
  backrooms.transition.bypass.cooldown:
    description: Allows bypassing Backrooms transition cooldowns
    default: op
  backrooms.bypass.build:
    description: Allows bypassing Backrooms build protection
    default: op
  backrooms.admin:
    description: Allows all Backrooms administrative commands
    default: op
    children:
      backrooms.command.br: true
      backrooms.command.reload: true
      backrooms.command.level.tp: true
      backrooms.command.debug.current: true
      backrooms.command.debug.config: true
      backrooms.command.transitions: true
      backrooms.command.transition.info: true
      backrooms.command.transition.trigger: true
      backrooms.command.transition.guide: true
      backrooms.command.room.list: true
      backrooms.command.room.info: true
      backrooms.command.room.generate: true
      backrooms.command.loot.list: true
      backrooms.command.loot.info: true
      backrooms.command.loot.roll: true
      backrooms.command.loot.source.list: true
      backrooms.command.loot.source.info: true
      backrooms.command.loot.source.trigger: true
      backrooms.command.item.list: true
      backrooms.command.item.info: true
      backrooms.command.item.give: true
      backrooms.command.resource.list: true
      backrooms.command.resource.info: true
      backrooms.command.worldgen.templates: true
      backrooms.command.worldgen.generate: true
      backrooms.transition.use: true
      backrooms.transition.bypass.cooldown: true
      backrooms.bypass.build: true
