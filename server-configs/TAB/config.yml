# Backrooms test server TAB config.
# Sync target: D:\dev\backrooms\devserver\plugins\TAB\config.yml
header-footer:
  enabled: true
  designs:
    default:
      header:
        - "&8&m                                                "
        - "&e&lBackrooms Test Server"
        - "&7玩家: &f%player% &8| &7组: &f%group%"
        - "&7在线: &f%online% &8| &7世界: &f%world%"
        - ""
      footer:
        - "&7Ping: &f%ping%ms &8| &7Staff: &f%staffonline%"
        - "&8Memory: &7%memory-used%/%memory-max% MB"
        - "&8Experimental Backrooms MVP environment"
        - "&8&m                                                "

tablist-name-formatting:
  enabled: true
  disable-condition: '%world%=disabledworld'

scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
    - "GROUPS:owner,admin,mod,helper,builder,vip,default"
    - "PLACEHOLDER_A_TO_Z:%player%"
  case-sensitive-sorting: false
  can-see-friendly-invisibles: false
  disable-condition: '%world%=disabledworld'

playerlist-objective:
  enabled: true
  value: "%ping%"
  fancy-value: "&7Ping: %ping%"
  title: "TAB"
  render-type: INTEGER
  disable-condition: '%world%=disabledworld'

belowname-objective:
  enabled: false
  value: "%health%"
  fancy-value: "&c%health%"
  fancy-value-default: "NPC"
  title: "&cHealth"
  disable-condition: '%world%=disabledworld'

prevent-spectator-effect:
  enabled: false

bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars:
    ServerInfo:
      style: "PROGRESS"
      color: "YELLOW"
      progress: "100"
      text: "&eBackrooms Test Server"

scoreboard:
  enabled: true
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard:
      title: "&e&lBackrooms"
      lines:
        - "&7%date% &8%time%"
        - ""
        - "&e你"
        - "&7名称: &f%player%"
        - "&7组: &f%group%"
        - "&7Ping: &f%ping%ms"
        - ""
        - "&e服务器"
        - "&7在线: &f%online%"
        - "&7世界: &f%world%"
        - "&7本世界: &f%worldonline%"

layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:37e93c8e12cd426cb28fce31969e0674
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      slot-count: 80
      fixed-slots: []
      groups:
        players:
          slots:
            - 1-80

ping-spoof:
  enabled: false
  value: 0

global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  update-latency: false
  spy-servers: []
  server-groups: {}

placeholders:
  date-format: "dd.MM.yyyy"
  time-format: "[HH:mm:ss / h:mm a]"
  time-offset: 0
  register-tab-expansion: false
  locale: en-US

placeholder-output-replacements: {}
conditions: {}

placeholder-refresh-intervals:
  default-refresh-interval: 500

assign-groups-by-permissions: false
primary-group-finding-list:
  - Owner
  - Admin
  - Mod
  - Helper
  - default
permission-refresh-interval: 1000
debug: false

mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true

proxy-support:
  enabled: true
  channel-name-suffix: "TAB"
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: 'redis://:password@localhost:6379/0'
  rabbitmq:
    exchange: 'plugin'
    url: 'amqp://guest:guest@localhost:5672/%2F'

components:
  minimessage-support: true
  disable-shadow-for-heads: true

config-version: 6

per-world-playerlist:
  enabled: false
  allow-bypass-permission: false
  ignore-effect-in-worlds:
    - ignoredworld
    - build
  shared-playerlist-world-groups: {}

compensate-for-packetevents-bug: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
