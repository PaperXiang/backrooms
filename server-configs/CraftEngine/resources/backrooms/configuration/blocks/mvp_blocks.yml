      title: "Unknown Corpse"
      rows: 3
      sounds:
        open: minecraft:block.wool.hit
        close: minecraft:block.wool.fall
      allow_input: true
      allow_output: true
    state:
      auto_state: lower_tripwire
      model:
        path: backrooms:block/corpse_cache
        generation:
          parent: minecraft:block/carpet
          textures:
            wool: minecraft:block/red_wool
    loot:
