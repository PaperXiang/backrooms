blocks:
  backrooms:loose_carpet_cache:
    settings:
      template:
        - default:sound/grass
        - default:hardness/wool
      overrides:
        is_suffocating: false
        is_view_blocking: false
        is_redstone_conductor: false
        can_occlude: false
        tags:
          - minecraft:mineable/hoe
    state:
      auto_state: lower_tripwire
      model:
        path: backrooms:block/loose_carpet_cache
        generation:
          parent: minecraft:block/carpet
          textures:
            wool: minecraft:block/yellow_wool
    loot:
      template: default:loot_table/basic
      arguments:
        item: backrooms:field_note
        count: 1
  backrooms:scrap_pile:
    settings:
      template:
        - default:sound/metal
        - default:hardness/stone
      overrides:
        tags:
          - minecraft:mineable/pickaxe
    state:
      auto_state: solid
      model:
        path: backrooms:block/scrap_pile
        generation:
          parent: minecraft:block/cube_all
          textures:
            all: minecraft:block/raw_iron_block
    loot:
      template: default:loot_table/basic
      arguments:
        item: backrooms:scrap_metal
        count: 2
  backrooms:supply_crate:
    settings:
      template:
        - default:sound/wood
        - default:hardness/wood
      overrides:
        tags:
          - minecraft:mineable/axe
    behavior:
      type: simple_storage_block
      title: "Supply Crate"
      rows: 3
      sounds:
        open: minecraft:block.barrel.open
        close: minecraft:block.barrel.close
      allow_input: true
      allow_output: true
    state:
      auto_state: solid
      model:
        path: backrooms:block/supply_crate
        generation:
          parent: minecraft:block/cube_all
          textures:
            all: minecraft:block/barrel_side
    loot:
      template: default:loot_table/self
  backrooms:corpse_cache:
    settings:
      template:
        - default:sound/grass
